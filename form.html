<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Tech Community - Pendaftaran</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6 bg-white p-4 rounded border shadow-sm">
                <h2 class="mb-4 text-center">Form Pendaftaran Anggota</h2>
                <form id="memberForm">
                    <div class="mb-3">
                        <label class="form-label">Nama Lengkap</label>
                        <input type="text" id="name" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" id="email" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Bidang Minat</label>
                        <select id="interest" class="form-select">
                            <option value="Web Developer">Web Developer</option>
                            <option value="Mobile Developer">Mobile Developer</option>
                            <option value="Data Science">Data Science</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Daftar Sekarang</button>
                    <a href="./index.html" class="btn btn-link d-block mt-2 text-center">Kembali ke Beranda</a> </form>

                <div id="result" class="mt-4 p-3 bg-light d-none">
                    <h5>Data Terkirim:</h5>
                    <p id="displayText"></p>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
